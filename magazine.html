<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skills Magazine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --bg-elevated: #0a0a0a;
      --surface: #111111;
      --surface-hover: #161616;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --text: #f5f5f5;
      --text-muted: #888888;
      --text-dim: #555555;
      --accent: #ff4d4d;
      --accent-glow: rgba(255,77,77,0.15);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --radius-xl: 40px;
      --sidebar-w: 280px;
      --transition: cubic-bezier(0.32,0.72,0,1);
    }

    [data-theme="light"] {
      --bg: #f8f8f8;
      --bg-elevated: #ffffff;
      --surface: #f0f0f0;
      --surface-hover: #e8e8e8;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.15);
      --text: #111111;
      --text-muted: #666666;
      --text-dim: #999999;
      --accent: #e02424;
      --accent-glow: rgba(224,36,36,0.1);
    }

    html {
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Grain Overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    /* Radial Glow Background */
    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -20%;
      width: 80%;
      height: 80%;
      background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ========== FLOATING NAV ========== */
    .nav-float {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px;
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .nav-brand {
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      border-right: 1px solid var(--border);
      margin-right: 4px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .nav-link {
      position: relative;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: color 0.3s var(--transition), background 0.3s var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link:hover {
      color: var(--text);
      background: var(--surface);
    }

    .nav-link.active {
      color: var(--text);
      background: var(--surface);
    }

    .nav-link.active::before {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
    }

    .sidebar-theme {
      width: 36px;
      height: 36px;
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: color 0.3s var(--transition), background 0.3s var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-theme svg {
      transition: opacity 0.3s;
    }

    .nav-overlay-theme svg {
      transition: opacity 0.3s, display 0.3s;
    }

    /* Hamburger */
    .hamburger {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 600;
      width: 48px;
      height: 48px;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      cursor: pointer;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 0;
    }

    .hamburger span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--text);
      border-radius: 1px;
      transition: transform 0.4s var(--transition), opacity 0.4s var(--transition);
    }

    .hamburger.open span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .hamburger.open span:nth-child(2) {
      opacity: 0;
      transform: scale(0);
    }

    .hamburger.open span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* Mobile Nav Overlay */
    .nav-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      z-index: 400;
      background-color: var(--bg);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      opacity: 0;
      transition: opacity 0.4s var(--transition);
      pointer-events: none;
      overscroll-behavior: none;
    }

    @supports (-webkit-fill-available: not 0) {
      .nav-overlay {
        height: -webkit-fill-available;
      }
    }

    .nav-overlay.open {
      display: block;
      opacity: 1;
      pointer-events: auto;
    }

    .nav-overlay-content {
      padding: 100px 32px 32px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .nav-overlay-theme {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-md);
      transition: color 0.3s var(--transition), background 0.3s var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 410;
    }

    .sidebar-theme:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .nav-overlay-theme:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    .nav-overlay-item {
      padding: 20px 0;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: color 0.3s var(--transition), transform 0.4s var(--transition), opacity 0.4s var(--transition);
      display: flex;
      align-items: center;
      gap: 16px;
      transform: translateY(20px);
      opacity: 0;
    }

    .nav-overlay-item.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .nav-overlay-item:hover,
    .nav-overlay-item.active {
      color: var(--text);
    }

    .nav-overlay-item .nav-icon {
      font-size: 24px;
    }

    /* ========== MAIN LAYOUT ========== */
    .layout {
      min-height: 100dvh;
      position: relative;
      z-index: 1;
      overflow-x: hidden;
    }

    /* ========== SIDEBAR ========== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100dvh;
      background: var(--bg-elevated);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 200;
    }

    @media (max-width: 1024px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.4s var(--transition), opacity 0.4s var(--transition), visibility 0.4s;
        visibility: hidden;
      }

      .sidebar.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
        visibility: visible;
      }
    }

    .sidebar-header {
      padding: 100px 28px 32px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 20px 16px;
      overflow-y: auto;
    }

    .sidebar-nav::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-nav::-webkit-scrollbar-thumb {
      background: var(--border-strong);
      border-radius: 2px;
    }

    .sidebar-item {
      position: relative;
      width: 100%;
      padding: 16px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.3s var(--transition);
      margin-bottom: 4px;
    }

    .sidebar-item:hover {
      color: var(--text);
      background: var(--surface);
    }

    .sidebar-item.active {
      color: var(--text);
      background: var(--surface);
    }

    .sidebar-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 24px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }

    .sidebar-item .item-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      border-radius: var(--radius-sm);
      font-size: 18px;
      transition: transform 0.3s var(--transition);
    }

    .sidebar-item:hover .item-icon {
      transform: scale(1.05);
    }

    .sidebar-item .item-text {
      flex: 1;
    }

    .sidebar-item .item-title {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .sidebar-item .item-desc {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ========== MAIN CONTENT ========== */
    .main {
      margin-left: var(--sidebar-w);
      padding: 100px 48px 48px;
      min-height: 100dvh;
      box-sizing: border-box;
    }

    .magazine {
      max-width: 860px;
      margin: 0 auto;
    }

    /* Hero Header */
    .magazine-hero {
      margin-bottom: 16px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }

    .eyebrow-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      padding: 10px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0px;
      letter-spacing: 0.2px;
    }

    .hero-desc-line {
      padding-left: 12px;
      border-left: 2px solid var(--accent);
      line-height: 1.6;
    }

    .hero-tag-dot {
      display: none;
    }



    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero-title {
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .hero-title span {
      color: var(--accent);
    }

    .hero-desc {
      font-size: 18px;
      color: var(--text-muted);
      max-width: 600px;
      line-height: 1.6;
    }

    /* Content Card (Double-Bezel) */
    .content-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 24px;
      max-width: 100%;
      display: none;
    }

    .content-card.visible {
      display: block;
    }

    /* Inner shell */
    .card-inner {
      padding: 16px 40px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .card-badge {
      padding: 6px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card-content {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-muted);
    }

    .card-content h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      margin: 10px 0 10px;
      letter-spacing: -0.5px;
    }

    .card-content h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin: 32px 0 16px;
      letter-spacing: -0.3px;
    }

    .card-content h2:first-child {
      margin-top: 0;
    }

    .card-content h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin: 24px 0 12px;
    }

    .card-content p {
      margin-bottom: 16px;
    }

    .card-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s var(--transition);
    }

    .card-content a:hover {
      border-bottom-color: var(--accent);
    }

    .card-content ul, .card-content ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }

    .card-content li {
      margin-bottom: 8px;
    }

    .card-content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.7;
      margin: 16px 0;
      color: var(--text);
    }

    .card-content code {
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface);
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid var(--border);
    }

    .card-content pre code {
      background: transparent;
      padding: 0;
      border: none;
      font-size: inherit;
    }

    .card-content blockquote {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 16px 20px;
      margin: 16px 0;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }

    .card-content blockquote p {
      margin: 0;
      color: var(--text-muted);
    }

    .card-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .card-content th, .card-content td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .card-content th {
      background: var(--surface);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }

    .card-content tr:last-child td {
      border-bottom: none;
    }

    .card-content tr:hover td {
      background: var(--surface);
    }

    /* Frontmatter */
    .frontmatter {
      background: linear-gradient(135deg, var(--accent-glow), transparent);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .frontmatter-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .frontmatter-item:last-child {
      margin-bottom: 0;
    }

    .frontmatter-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      min-width: 100px;
    }

    .frontmatter-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
    }

    /* ========== BACK TO TOP ========== */
    .back-to-top {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 52px;
      height: 52px;
      background: var(--surface);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--text);
      cursor: pointer;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: all 0.4s var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-to-top.visible {
      opacity: 1;
      pointer-events: auto !important;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--surface);
      border-color: var(--border-strong);
    }

    .back-to-top:active {
      transform: scale(0.95);
    }

    .back-to-top svg {
      width: 20px;
      height: 20px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1024px) {
      .layout {
      }

      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.4s var(--transition), opacity 0.4s var(--transition), visibility 0.4s;
        visibility: hidden;
      }

      .sidebar.open {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
        visibility: visible;
      }

      .main {
        margin-left: 0;
        padding: 100px 24px 48px;
      }

      .magazine {
        max-width: 100%;
      }

      .hamburger {
        display: flex;
      }

      .nav-float {
        display: none;
      }

      .nav-overlay {
        display: block;
      }
    }

    @media (max-width: 640px) {
      .main {
        padding: 80px 16px 32px;
      }

      .magazine {
        max-width: 100%;
      }

      .card-inner {
        padding: 12px 16px;
      }

      .hero-title {
        letter-spacing: -1px;
      }

      .hero-desc {
        font-size: 16px;
      }

      .back-to-top {
        bottom: 20px;
        right: 20px;
        width: 44px;
        height: 44px;
      }
    }

    /* ========== LOADING STATE ========== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<!-- Hamburger -->
  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <!-- Mobile Overlay -->
  <div class="nav-overlay" id="navOverlay">
    <div class="nav-overlay-content" id="navOverlayContent">
      <button class="nav-overlay-theme" id="navOverlayTheme" title="Toggle theme">
        <svg class="icon-sun" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Skills</h1>
        <p>Library</p>
        <button class="sidebar-theme" id="sidebarTheme" title="Toggle theme">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav" id="nav"></nav>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="magazine">
        <header class="magazine-hero" id="magazineHero">
          <div class="eyebrow">
            <span class="eyebrow-dot"></span>
            <span>Personal Knowledge Base</span>
          </div>
          <h1 class="hero-title" id="heroTitle">Skills <span>Magazine</span></h1>
          <div class="hero-tag" id="heroTag">
          <span class="hero-desc-line" id="heroDesc">Your personal skill library</span>
        </div>
        </header>
        <div class="contents" id="contents">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span>Loading content...</span>
          </div>
        </div>
      </div>
    </main>
  </main>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <script>
    const skills = [
      { id: 'build-cron', title: 'Build Cron', icon: '⏰', path: 'build-cron/SKILL.md' },
      { id: 'commit-format', title: 'Commit Format', icon: '📝', path: 'commit-format/SKILL.md' },
      { id: 'follow-builders', title: 'Follow Builders', icon: '🏗️', path: 'follow-builders/SKILL.md' },
      { id: 'news-analysis', title: 'News Analysis', icon: '📰', path: 'news-analysis/SKILL.md' }
    ];

    function e(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function parseFrontmatter(text) {
      const match = text.match(/^---\n([\s\S]*?)\n---\n/);
      if (!match) return { frontmatter: null, body: text };
      const fm = {};
      match[1].split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx > 0) fm[line.slice(0, idx).trim()] = line.slice(idx + 1).trim();
      });
      return { frontmatter: fm, body: text.slice(match[0].length) };
    }

    function parseMarkdown(text) {
      const blocks = [];
      let idx = 0;
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const ph = `%%CODEBLOCK${idx}%%`;
        blocks.push(`<pre><code>${e(code.trim())}</code></pre>`);
        idx++;
        return ph;
      });
      let html = text;
      html = html.replace(/`([^`]+)`/g, (_, c) => `<code>${e(c)}</code>`);
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      html = html.replace(/(<li>.*<\/li>)+/g, '<ul>$&</ul>');
      html = html.replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>');
      html = html.replace(/\|(.+)\|\n\|[-| ]+\|\n((?:\|.+\|\n)*)/g, (_, h, rows) => {
        const hs = h.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
        const br = rows.trim().split('\n').map(r => '<tr>' + r.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('') + '</tr>').join('');
        return `<table><thead><tr>${hs}</tr></thead><tbody>${br}</tbody></table>`;
      });
      html = html.replace(/\n\n+/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p>(<h[123]>)/g, '$1').replace(/(<\/h[123]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1').replace(/(<\/pre>)<\/p>/g, '$1');
      html = html.replace(/<p>(<table>)/g, '$1').replace(/(<\/table>)<\/p>/g, '$1');
      html = html.replace(/<p>(<ul>)/g, '$1').replace(/(<\/ul>)<\/p>/g, '$1');
      html = html.replace(/<p>(<blockquote>)/g, '$1').replace(/(<\/blockquote>)<\/p>/g, '$1');
      blocks.forEach((b, i) => { html = html.replace(`%%CODEBLOCK${i}%%`, b); });
      return html;
    }

    function renderContent(s, fm, body, active) {
      let h = `<div class="content-card${active?' visible':''}" data-id="${s.id}">`;
      h += `<div class="card-inner">`;
      h += `<div class="card-content">`;
      h += parseMarkdown(body);
      h += `</div></div></div>`;
      return h;
    }

    function renderFrontmatter(fm) {
      if (!fm) return '';
      let html = '<div class="frontmatter">';
      if (fm.name) html += `<div class="frontmatter-item"><span class="frontmatter-label">Name</span><span class="frontmatter-value">${fm.name}</span></div>`;
      if (fm.description) html += `<div class="frontmatter-item"><span class="frontmatter-label">Description</span><span class="frontmatter-value">${fm.description}</span></div>`;
      if (fm.author) html += `<div class="frontmatter-item"><span class="frontmatter-label">Author</span><span class="frontmatter-value">${fm.author}</span></div>`;
      html += '</div>';
      return html;
    }

    async function load() {
      const nav = document.getElementById('nav');
      
      const navOverlayContent = document.getElementById('navOverlayContent');
      const contents = document.getElementById('contents');

      const rs = await Promise.all(skills.map(async s => {
        try {
          const r = await fetch(s.path + '?t=' + Date.now());
          const t = await r.text();
          return { s, ...parseFrontmatter(t) };
        } catch {
          return { s, frontmatter: null, body: '' };
        }
      }));

      contents.innerHTML = rs.map((r, i) => {
        return renderContent(r.s, r.frontmatter, r.body, i === 0);
      }).join('');

      if (rs[0] && rs[0].frontmatter) {
        document.getElementById('heroTitle').innerHTML = (rs[0].frontmatter.name || skills[0].title) + ' <span>Magazine</span>';
        document.getElementById('heroDesc').textContent = rs[0].frontmatter.description || '';
      }

      // Sidebar nav
      rs.forEach((r, i) => {
        const s = r.s;
        const el = document.createElement('button');
        el.className = 'sidebar-item' + (i === 0 ? ' active' : '');
        el.dataset.id = s.id;
        el.innerHTML = `
          <span class="item-icon">${s.icon}</span>
          <div class="item-text">
            <div class="item-title">${s.title}</div>
            <div class="item-desc">${(r.frontmatter && r.frontmatter.description) ? r.frontmatter.description.slice(0, 30) + '...' : 'Skill'}</div>
          </div>
        `;
        el.onclick = () => {
          document.querySelectorAll('.sidebar-item').forEach(n => n.classList.remove('active'));
          document.querySelectorAll('.content-card').forEach(c => c.classList.remove('visible'));
          el.classList.add('active');
          const target = document.querySelector(`.content-card[data-id="${s.id}"]`);
          if (target) {
            target.classList.add('visible');
          }
          const hero = document.getElementById('magazineHero');
          if (hero) {
            setTimeout(() => {
              document.documentElement.scrollTop = 0;
            }, 10);
          }
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('hamburger').classList.remove('open');
          document.getElementById('navOverlay').classList.remove('open');
          const fm = rs[i] && rs[i].frontmatter;
          document.getElementById('heroTitle').innerHTML = ((fm && fm.name) ? fm.name : s.title) + ' <span>Magazine</span>';
          document.getElementById('heroDesc').textContent = (fm && fm.description) ? fm.description : '';
        };
        nav.appendChild(el);


        // Mobile overlay item
        const overlayItem = document.createElement('div');
        overlayItem.className = 'nav-overlay-item' + (i === 0 ? ' active' : '');
        overlayItem.dataset.id = s.id;
        overlayItem.innerHTML = `<span class="nav-icon">${s.icon}</span><span>${s.title}</span>`;
        overlayItem.onclick = () => {
          document.querySelectorAll('.sidebar-item').forEach(n => n.classList.remove('active'));
          document.querySelectorAll('.content-card').forEach(c => c.classList.remove('visible'));
          document.querySelectorAll('.nav-overlay-item').forEach(n => n.classList.remove('active'));
          el.classList.add('active');
          overlayItem.classList.add('active');
          const target = document.querySelector(`.content-card[data-id="${s.id}"]`);
          if (target) {
            target.classList.add('visible');
          }
          const hero = document.getElementById('magazineHero');
          if (hero) {
            setTimeout(() => {
              document.documentElement.scrollTop = 0;
            }, 10);
          }
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('hamburger').classList.remove('open');
          document.getElementById('navOverlay').classList.remove('open');
          const fm = rs[i] && rs[i].frontmatter;
          document.getElementById('heroTitle').innerHTML = ((fm && fm.name) ? fm.name : s.title) + ' <span>Magazine</span>';
          document.getElementById('heroDesc').textContent = (fm && fm.description) ? fm.description : '';
        };
        navOverlayContent.appendChild(overlayItem);
      });
    }

    // Hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const navOverlay = document.getElementById('navOverlay');
    const overlayItems = document.querySelectorAll('.nav-overlay-item');

    function isMobile() {
      return window.innerWidth <= 1024;
    }

    hamburger.addEventListener('click', () => {
      const open = hamburger.classList.toggle('open');
      navOverlay.classList.toggle('open');
      if (navOverlay.classList.contains('open')) {
        setTimeout(() => {
          document.querySelectorAll('.nav-overlay-item').forEach((item, i) => {
            setTimeout(() => item.classList.add('visible'), i * 80);
          });
        }, 100);
      } else {
        document.querySelectorAll('.nav-overlay-item').forEach(item => item.classList.remove('visible'));
      }
    });

    // Close nav-overlay on resize to desktop
    window.addEventListener('resize', () => {
      if (window.innerWidth > 1024) {
        document.getElementById('hamburger').classList.remove('open');
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('navOverlay').classList.remove('open');
        document.querySelectorAll('.nav-overlay-item').forEach(item => item.classList.remove('visible'));
      }
    });

    // Theme toggle
    function getPreferredTheme() {
      const saved = localStorage.getItem('theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
    }

    setTheme(getPreferredTheme());
    updateThemeIcon(getPreferredTheme());

    function updateThemeIcon(next) {
      document.querySelectorAll('.icon-sun').forEach(el => el.style.display = next === 'dark' ? 'none' : 'block');
      document.querySelectorAll('.icon-moon').forEach(el => el.style.display = next === 'dark' ? 'block' : 'none');
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      setTheme(next);
      updateThemeIcon(next);
    }

    document.getElementById('sidebarTheme').addEventListener('click', toggleTheme);
    document.getElementById('navOverlayTheme').addEventListener('click', toggleTheme);

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      if (!localStorage.getItem('theme')) setTheme(e.matches ? 'dark' : 'light');
    });

    // Back to top
    window.addEventListener('scroll', () => {
      document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 400);
    });

    document.getElementById('backToTop').addEventListener('click', () => {
      window.scrollTo(0, 0);
    });

    load();
  </script>
</body>
</html>
